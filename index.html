<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicharm - Controle de Produção</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #131418;
            --accent-color: #3b82f6; /* Mudei para azul industrial, mais padrão fábrica */
            --accent-hover: #2563eb;
            --text-color: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; padding-bottom: 100px; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 600px; padding: 16px; margin: 0 auto; }
        
        .card { background: linear-gradient(145deg, #16171a 0%, #111215 100%); border: 1px solid var(--border-color); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; width: 100%; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .form-group input, .form-group select { 
            width: 100%; height: 44px; padding: 0 12px; background: #18191c; 
            border: 1px solid #33353b; border-radius: 10px; color: white; font-size: 14px; 
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-color); outline: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        h2, h3, h4 { color: #ffffff; margin-top: 0; }
        h2 { font-size: 22px; text-align: center; }
        h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}
        
        .btn-primary { width: 100%; background: var(--accent-color); color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-secondary { width: 100%; background: transparent; color: var(--accent-color); border: 1px dashed var(--accent-color); padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 16px;}
        .btn-danger-small { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 8px;}

        .dynamic-item { background: #1a1c23; border: 1px solid #2a2c32; padding: 12px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        
        .escondido { display: none !important; }
        
        .resumo-box { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); padding: 16px; border-radius: 12px; margin-bottom: 16px; }
        .resumo-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .status-ok { color: var(--success-color); font-weight: bold; }
        .status-erro { color: var(--danger-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="tela-login" class="card" style="margin-top: 10vh;">
        <h2>Unicharm Production</h2>
        <p style="text-align:center; color:var(--text-muted); font-size: 13px; margin-top:-10px; margin-bottom: 25px;">Sistema de Apontamento Digital</p>

        <div class="form-group">
            <label>Usuário:</label>
            <input type="text" id="login-usuario" placeholder="Digite seu usuário">
        </div>
        <div class="form-group">
            <label>Senha:</label>
            <input type="password" id="login-senha" placeholder="•••••">
        </div>
        <button class="btn-primary" id="btn-entrar" onclick="executarLogin()">Entrar</button>
    </div>

    <div id="tela-operador" class="escondido">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 id="boas-vindas">Apontamento de Turno</h2>
            <button onclick="sair()" style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-weight:bold;">Sair da Conta</button>
        </div>

        <div class="card">
            <h3>1. Dados do Turno</h3>
            <div class="grid-2">
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="ap-data">
                </div>
                <div class="form-group">
                    <label>Turno:</label>
                    <select id="ap-turno" onchange="calcularResumo()">
                        <option value="1">Turno 1 (455m)</option>
                        <option value="2">Turno 2 (440m)</option>
                        <option value="3">Turno 3 (415m)</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Máquina:</label>
                    <select id="ap-maquina" onchange="carregarSkusEParadasDaMaquina()">
                        <option value="1">Máquina 1</option>
                        <option value="2">Máquina 2</option>
                        <option value="3">Máquina 3</option>
                        <option value="4">Máquina 4</option>
                        <option value="5">Máquina 5</option>
                        <option value="6">Máquina 6</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tempo Não Oper. (min):</label>
                    <input type="number" id="ap-tno" value="0" min="0" oninput="calcularResumo()">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>2. Ordens de Produção</h3>
            <div id="container-ordens"></div>
            <button class="btn-secondary" onclick="adicionarOrdem()">+ Adicionar Nova Ordem</button>
        </div>

        <div class="card">
            <h3>3. Paradas de Máquina</h3>
            <div id="container-paradas"></div>
            <button class="btn-secondary" onclick="adicionarParada()">+ Adicionar Nova Parada</button>
        </div>

        <div class="card">
            <h3>4. Validação e Envio</h3>
            <div class="resumo-box" id="box-resumo">
                <div class="resumo-item"><span>Carga do Turno:</span> <span id="res-carga">0m</span></div>
                <div class="resumo-item"><span>Tempo Total Apontado:</span> <span id="res-total" class="status-erro">0m</span></div>
                <div style="border-top: 1px dashed #333; margin: 8px 0;"></div>
                <div class="resumo-item"><span>Paradas Calculadas (Obrigatório):</span> <span id="res-parada-calc">0m</span></div>
                <div class="resumo-item"><span>Paradas Apontadas:</span> <span id="res-parada-apon" class="status-erro">0m</span></div>
            </div>
            <button class="btn-primary" id="btn-enviar-apontamento" onclick="enviarApontamento()" disabled>Enviar Apontamento</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
